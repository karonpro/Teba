{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-title">Delete Entry</div>
  <p>Are you sure you want to delete the entry dated <strong>{{ object.date }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn danger">Yes, delete</button>
    <a class="btn secondary" href="{% url 'sales:list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
