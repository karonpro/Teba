{% extends "base.html" %}
{% block title %}Delete Location{% endblock %}
{% block content %}
<div class="card p-3">
  <h4>Delete "{{ obj.name }}"?</h4>
  <form method="post">{% csrf_token %}
    <p>This action cannot be undone.</p>
    <button class="btn btn-danger">Delete</button>
    <a class="btn btn-secondary" href="{% url 'sales:locations' %}">Cancel</a>
  </form>
</div>
{% endblock %}
